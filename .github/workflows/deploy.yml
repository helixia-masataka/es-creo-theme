name: Deploy Theme to es-creo.com

on:
  push:
    branches:
      - main
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build assets
        run: npm run build

      - name: Prepare remote path
        id: prep
        run: |
          REMOTE_PATH="${{ secrets.FTP_REMOTE_PATH }}"
          # 末尾に / がなければ追加する
          if [[ ! "$REMOTE_PATH" == */ ]]; then
            REMOTE_PATH="$REMOTE_PATH/"
          fi
          echo "path=$REMOTE_PATH" >> $GITHUB_OUTPUT

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ steps.prep.outputs.path }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/src/**
            gulpfile.js
            package.json
            package-lock.json
            README.md
            .vscode/**
            .agent/**
            .agents/**
            .gemini/**
            brain/**
